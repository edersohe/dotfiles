# Copilot language server
[language-server.copilot]
command = "copilot-language-server"
args = ["--stdio"]

[language-server.copilot.config]
editorInfo = { name = "Helix", version = "25.07.1" }
editorPluginInfo = { name = "helix-copilot", version = "0.1.0" }

# Snippets language server
[language-server.scls]
command = "simple-completion-language-server"

[language-server.scls.config]
feature_words = false                # enable completion by word
feature_snippets = true              # enable snippets
snippets_first = true                # completions will return before snippets by default
snippets_inline_by_word_tail = false # suggest snippets by WORD tail, for example text `xsq|` become `x^2|` when snippet `sq` has body `^2`
feature_unicode_input = false        # enable "unicode input"
feature_paths = false                # enable path completion
feature_citations = false            # enable citation completion (only on `citation` feature enabled)

[language-server.scls.environment]
RUST_LOG = "info,simple-completion-language-server=info"
LOG_FILE = "/tmp/completion.log"

#Elixir
[language-server.expert]
command = "expert"

[[language]]
name = "elixir"
language-servers = ["elixir-ls", "expert", "copilot"]

[[language]]
name = "heex"
language-servers = ["elixir-ls", "tailwindcss-ls", "expert", "copilot"]

# Rust
[language-server.rust-analyzer.config.check]
command = "clippy"

[language-server.rust-analyzer.config.cargo]
features = "all"

[[language]]
name = "rust"
language-servers = ["rust-analyzer", "copilot"]

# Go
[[language]]
name = "go"
auto-format = true
formatter = { command = "goimports" }
language-servers = ["gopls", "golangci-lint-lsp", "copilot"]

# PHP
[language-server.phpactor]
command = "phpactor"
args = ["language-server"]

[[language]]
name = "php"
language-servers = ["phpactor", "copilot"]

# SQL
[language-server.sql-language-server]
command = "sql-language-server"
args = ["up", "--method", "stdio"]

[[language]]
name = "sql"
language-servers = ["sql-language-server", "copilot"]

# Python
[language-server.ty]
command = "ty"
args = ["server"]

[language-server.ty.config]
inlayHints.callArgumentNames = false
experimental.rename = true
experimental.autoImport = true

[language-server.ruff]
command = "ruff"
args = ["server"]

[[language]]
name = "python"
language-servers = ["ty", "ruff", "copilot"]

# Ruby
[language-server.ruby-lsp]
command = "ruby-lsp"
config = { diagnostics = true, formatting = true }

[[language]]
name = "ruby"
language-servers = ["ruby-lsp", "copilot"]

# HTML, CCS, JavaScript, TypeScript, JSX, and TSX
[language-server]
biome = { command = "biome", args = ["lsp-proxy"] }

[[language]]
name = "javascript"
language-servers = [
  { name = "typescript-language-server", except-features = [
    "format",
  ] },
  "biome",
  "tailwindcss-ls",
  "copilot",
]

[[language]]
name = "typescript"
language-servers = [
  { name = "typescript-language-server", except-features = [
    "format",
  ] },
  "biome",
  "tailwindcss-ls",
  "copilot",
]

[[language]]
name = "jsx"
language-servers = [
  { name = "typescript-language-server", except-features = [
    "format",
  ] },
  "biome",
  "tailwindcss-ls",
  "copilot",
]

[[language]]
name = "tsx"
language-servers = [
  { name = "typescript-language-server", except-features = [
    "format",
  ] },
  "biome",
  "tailwindcss-ls",
  "copilot",
]

[[language]]
name = "html"
language-servers = [
  { name = "vscode-html-language-server", except-features = [
    "format",
  ] },
  "biome",
  "tailwindcss-ls",
  "copilot",
]

[[language]]
name = "css"
language-servers = [
  { name = "vscode-css-language-server", except-features = [
    "format",
  ] },
  "biome",
  "tailwindcss-ls",
  "copilot",
]

# JSON, TOML and YAML
[[language]]
name= "json"
language-servers = [
  { name = "vscode-json-language-server", except-features = [
    "format",
  ] },
  "biome",
  "copilot",
]

[[language]]
name = "toml"
formatter = { command = "tombi", args = ["fmt", "-"] }
language-servers = ["tombi", "copilot"]

[language-server.yaml-language-server.config.yaml]
format = { enable = true }
validation = true

[[language]]
name = "yaml"
language-servers = ["yaml-language-server", "copilot"]

[[language]]
name = "markdown"
language-servers = ["copilot", "marksman"]
auto-format = true
